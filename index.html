---
layout: default
---

<div class="section-title">最新文章</div>

<ul class="post-list" id="postList"></ul>

<div class="pagination" id="pagination"></div>

<script>
var page = 1;
var perPage = 10;
var posts = [];

fetch('{{ "/assets/search.json" | relative_url }}')
  .then(function(r) { return r.json(); })
  .then(function(data) {
    posts = data;
    render();
  });

function render() {
  var start = (page - 1) * perPage;
  var end = start + perPage;
  var pagePosts = posts.slice(start, end);
  var totalPages = Math.ceil(posts.length / perPage);

  // Render posts
  var list = document.getElementById('postList');
  list.innerHTML = pagePosts.map(function(p) {
    var tags = p.tags.slice(0, 3).map(function(t) {
      return '<span class="tag">' + t + '</span>';
    }).join('');
    return '<li><a href="' + p.url + '" class="post-title">' + p.title + '</a>' +
           '<div class="post-meta"><time>' + p.date + '</time>' +
           (tags ? '<span>' + tags + '</span>' : '') + '</div></li>';
  }).join('');

  // Render pagination
  var pg = document.getElementById('pagination');
  if (totalPages <= 1) { pg.innerHTML = ''; return; }

  var html = '';
  html += page > 1 ? '<a href="#" onclick="go(' + (page-1) + ');return false">← 上一页</a>' :
                     '<span style="color:#ccc">← 上一页</span>';
  html += '<span style="color:#999;font-size:0.85rem">' + page + ' / ' + totalPages + '</span>';
  html += page < totalPages ? '<a href="#" onclick="go(' + (page+1) + ');return false">下一页 →</a>' :
                              '<span style="color:#ccc">下一页 →</span>';
  pg.innerHTML = html;
}

function go(n) {
  page = n;
  render();
  window.scrollTo({top: 0, behavior: 'smooth'});
}
</script>
