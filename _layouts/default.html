<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">
  {% seo %}
  {% feed_meta %}
</head>
<body>

<header>
  <div class="wrapper">
    <div>
      <h1><a href="{{ "/" | relative_url }}">{{ site.title }}</a></h1>
      <div class="subtitle">{{ site.description }}</div>
    </div>
    <nav>
      <a href="{{ "/" | relative_url }}">首页</a>
      <a href="{{ "/about/" | relative_url }}">关于</a>
      <a href="https://github.com/DyNooob" target="_blank" rel="noopener">GitHub</a>
    </nav>
  </div>
</header>

<main>
  <div class="wrapper">
    {{ content }}
  </div>
</main>

<footer>
  <div class="wrapper">
    <div class="footer-links">
      <span class="label">友情链接：</span>
      <a href="https://xn--ehq593l0v87d.com" target="_blank" rel="noopener">电子取证.com</a>
      <a href="https://loken.cn" target="_blank" rel="noopener">Loken.cn</a>
    </div>
    <div class="copyright">&copy; {{ site.time | date: "%Y" }} {{ site.author }}</div>
  </div>
</footer>

</body>
</html>
