# _config.yml
title: "NOOOB Tech Blog"
description: "网络安全 · 技术开发 · 日常笔记"
author: "DyNooob"
baseurl: ""
url: "https://dynooob.github.io"

# 主题
theme: jekyll-theme-hacker

# 语言
lang: zh-CN
timezone: Asia/Shanghai

# 分页
paginate: 10

# 文章设置
permalink: /posts/:title/
show_excerpts: true

# 构建
markdown: kramdown
kramdown:
  syntax_highlighter: rouge

# 插件
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# 默认值
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      toc: true